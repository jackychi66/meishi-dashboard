<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>梅侍梅酒｜申請加入</title>
<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="config.js"></script>
</head>
<body>
<div class="box">
<div class="logo"><img src="logo.png" alt="梅侍 PLUMATE" onerror="this.outerHTML=&quot;<div class=\&quot;zh\&quot;>梅<br>侍</div><div class=\&quot;en\&quot;>PLUMATE</div>&quot;"></div>
<h2>申請加入後台</h2>
<form id="f">
<label>姓名 *</label>
<input type="text" id="nm" required>
<label>Email *</label>
<input type="email" id="email" required autocomplete="username">
<label>設定密碼 *（至少 8 碼）</label>
<input type="password" id="pw" required minlength="8" autocomplete="new-password">
<label>申請說明（部門／用途，選填）</label>
<textarea id="note" rows="2"></textarea>
<button class="main" id="btn" type="submit">送出申請</button>
</form>
<div class="msg" id="msg"></div>
<div class="links">已有帳號？<a href="index.html">回登入</a></div>
<div class="foot">送出後需經管理員核准才能登入</div>
</div>
<script>
const sb=window.supabase.createClient(MEISHI_CFG.url,MEISHI_CFG.key);
const msg=document.getElementById("msg");
document.getElementById("f").onsubmit=async e=>{
 e.preventDefault();
 const btn=document.getElementById("btn");btn.disabled=true;msg.className="msg";msg.textContent="送出中…";
 const {error}=await sb.auth.signUp({email:email.value.trim(),password:pw.value,
  options:{data:{name:nm.value.trim(),note:note.value.trim()}}});
 if(error){msg.className="msg err";msg.textContent="申請失敗："+(error.message.includes("already")?"此 Email 已申請過":error.message);btn.disabled=false;return;}
 await sb.auth.signOut();
 msg.className="msg ok";msg.textContent="✅ 申請已送出！管理員核准後即可登入。";
 document.getElementById("f").style.display="none";
};
</script>
</body></html>
