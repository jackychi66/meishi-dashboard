<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>梅侍梅酒｜後台登入</title>
<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="config.js"></script>
</head>
<body>
<div class="box">
<div class="logo"><img src="https://custom-images.strikinglycdn.com/res/hrscywv4p/image/upload/c_limit,fl_lossy,h_300,w_300,f_auto,q_auto/4979860/273741_296949.png" alt="梅侍 PLUMATE" onerror="this.outerHTML=&quot;<div class=\&quot;zh\&quot;>梅<br>侍</div><div class=\&quot;en\&quot;>PLUMATE</div>&quot;"></div>
<h2>工廠庫存與出貨管理後台</h2>
<form id="f">
<label>Email</label>
<input type="email" id="email" required autocomplete="username">
<label>密碼</label>
<input type="password" id="pw" required autocomplete="current-password">
<button class="main" id="btn" type="submit">登入</button>
</form>
<div class="msg" id="msg"></div>
<div class="links">還沒有帳號？<a href="apply.html">申請加入</a></div>
<div class="foot">梅侍 Plummate © 2026</div>
</div>
<script>
const sb=window.supabase.createClient(MEISHI_CFG.url,MEISHI_CFG.key);
const msg=document.getElementById("msg");
document.getElementById("f").onsubmit=async e=>{
 e.preventDefault();
 const btn=document.getElementById("btn");btn.disabled=true;msg.className="msg";msg.textContent="登入中…";
 const {data,error}=await sb.auth.signInWithPassword({email:email.value.trim(),password:pw.value});
 if(error){msg.className="msg err";msg.textContent="登入失敗："+(error.message.includes("Invalid")?"帳號或密碼錯誤":error.message);btn.disabled=false;return;}
 const {data:p}=await sb.from("profiles").select("approved").eq("id",data.user.id).single();
 if(!p||!p.approved){await sb.auth.signOut();msg.className="msg err";msg.textContent="您的申請尚未核准，請等待管理員審核";btn.disabled=false;return;}
 location.href="dashboard.html";
};
(async()=>{const {data:{session}}=await sb.auth.getSession();
 if(session){const {data:p}=await sb.from("profiles").select("approved").eq("id",session.user.id).single();
  if(p&&p.approved)location.href="dashboard.html";}})();
</script>
</body></html>
