<header><h1>🍶 梅侍梅酒｜工廠產品庫存與每月出貨統計</h1>
<p>庫存／出貨來源：長盛｜在庫與生產統計表（梅酒庫存流水帳）；叫貨紀錄來源：長盛對帳表</p>

<div class="note" id="invNote"></div>
<div class="card"><h3 id="invTitle">產品庫存總表</h3><div class="scroll"><table id="invT"></table></div></div>
</div>
<div class="panel" id="p-ship">
<div class="note">來源：雲端「梅酒庫存」流水帳，<b>2025 年涵蓋完整 1–12 月</b>、2026 年至最新紀錄；出貨含辦公室進貨、酒展、客戶直送、長盛自購、代工出貨等所有出庫。圖表與矩陣<b>依年度分開</b>（年份選單切換），矩陣依<b>該年度出貨量高→低</b>排序。</div>
<div class="card"><h3 id="shipChartTitle">每月出貨趨勢（瓶）</h3>
<div class="filters"><select id="shipYear"><option value="2026" selected>2026年</option><option value="2025">2025年</option></select><select id="shipProd"><option value="">全部品項</option></select></div>

<div class="card"><h3 id="shipTTitle">每月出貨統計矩陣</h3>
<div class="filters"><select id="shipYear2"><option value="2026" selected>2026年</option><option value="2025">2025年</option></select></div>
<div class="scroll"><table id="shipT"></table></div></div>
</div>
<div class="panel" id="p-det">
<div class="card"><h3>出貨明細（流水帳，共 <span id="detN"></span> 筆）</h3>
<div class="filters">
<select id="fYear"><option value="">全部年份</option></select>
<select id="fMonth"><option value="">全部月份</option></select>
<select id="fProd"><option value="">全部品項</option></select>
<select id="fDst"><option value="">全部出貨類別</option></select>
<input type="text" id="fQ" placeholder="搜尋…">
</div>
<div class="scroll"><table id="detT"></table></div></div>
</div>
<div class="panel" id="p-ord">
<div class="card"><h3 id="ordChartTitle">每月叫貨量（瓶）</h3>
<div class="filters"><select id="ordYear"><option value="2026" selected>2026年</option><option value="2025">2025年</option></select></div>
<canvas id="ordChart"></canvas></div>

<div class="filters"><select id="oYear"><option value="">全部年份</option></select></div>
<div class="scroll"><table id="ordT"></table></div></div>
</div>
</main>

 let hi=-1;rows.forEach((r,i)=>{if(hi<0&&(r[0]||"").trim()==="進出項")hi=i;});
 if(hi<0)return null;
 const cols=[];rows[hi].forEach((v,j)=>{if(j>=2&&v){const m=v.replace(/[\n\r]/g,"").match(/^(.*?)(\d+ml)/);if(m)cols.push({j,p:m[1].trim(),s:m[2]});}});
 const cmap={};cols.forEach(c=>cmap[c.j]=c);
 let curY=2024,curM=12,lastBal=null;const S={};const events=[];
 const add=(j,y,t,q)=>{S[j]=S[j]||{};const k=y+t;S[j][k]=(S[j][k]||0)+q;};
 for(let i=hi+1;i<rows.length;i++){
  const r=rows[i],label=(r[0]||"").trim(),d=(r[1]||"").trim();
  if(/剩[余餘]庫存/.test(label)){lastBal={date:d,vals:r};continue;}
  if(!label)continue;
  const isIN=/下單|下訂|客製代工/.test(label)||(/生產/.test(label)&&!/出貨|進貨/.test(label));
  let y=null,mo=null,m;
  if(isIN&&(m=label.match(/^(\d+)\/(\d+)/)))mo=+m[1];
  if(mo===null&&(m=d.match(/(20\d\d)\/(\d+)\/(\d+)/))){y=+m[1];mo=+m[2];if(!isIN){curY=y;curM=mo;}}
  else if(mo===null){m=d.match(/(\d+)\/(\d+)/);mo=m?+m[1]:curM;}
  if(y===null){if(isIN)y=(mo-curM>6)?curY-1:curY;else{if(mo<curM-6)curY++;curM=mo;y=curY;}}
  for(let j=2;j<=30;j++){const q=parseInt(String(r[j]||"").replace(/,/g,""));if(!q)continue;
   add(j,y,isIN?"I":"O",q);
   if(cmap[j])events.push({y,m:mo,t:isIN?"I":"O",p:cmap[j].p,s:cmap[j].s,q,lb:label});}
 }
 if(!lastBal||!cols.length)return null;
 const date=/^\d{4}/.test(lastBal.date)?lastBal.date.replace(/-/g,"/"):(lastBal.date?curY+"/"+lastBal.date:curY+"/?");
 const out=cols.map(c=>{const d2=S[c.j]||{};const g=k=>d2[k]||0;
  const open=g("2024I")-g("2024O")+g("2025I")-g("2025O");
  return {p:c.p,s:c.s,net24:g("2024I")-g("2024O"),o25:g("2025I"),x25:g("2025O"),open,
   o26:g("2026I"),x26:g("2026O"),cur:parseInt(String(lastBal.vals[c.j]||"0").replace(/,/g,""))||0};});
 return {date,rows:out,events};}

function levMatrix(year,type,prodFilter){
 const M={};
 LEV.forEach(e=>{if(e.y!==year||e.t!==type)return;if(prodFilter&&e.p!==prodFilter)return;
  const k=e.p+"||"+e.s;M[k]=M[k]||Array(12).fill(0);M[k][e.m-1]+=e.q;});
 return M;}

   <div class="kpi"><div class="v">${fmt(tot.o26)}</div><div class="l">2026 叫貨（瓶）</div></div>
   <div class="kpi"><div class="v">${fmt(tot.x26)}</div><div class="l">2026 出貨（瓶）</div></div>
   <div class="kpi"><div class="v">${fmt(tot.x25)}</div><div class="l">2025 出貨（1–12月）</div></div>`;
}

}
