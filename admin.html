<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>梅侍梅酒｜會員管理</title>
<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script src="config.js"></script>
<style>
body{align-items:flex-start}
.box{max-width:900px}
table{width:100%;border-collapse:collapse;font-size:13px;margin-top:14px}
th{background:var(--amber);color:#fff;padding:8px 6px;text-align:left;white-space:nowrap}
td{padding:8px 6px;border-bottom:1px solid #eee}
.badge{display:inline-block;padding:2px 10px;border-radius:12px;font-size:12px;font-weight:700}
.badge.p{background:#fdf1d0;color:#8a6d1a}.badge.a{background:#e3f2e4;color:var(--green)}.badge.adm{background:#ede3f7;color:#5e35b1}
button.sm{padding:5px 12px;border:none;border-radius:7px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;margin-right:6px}
.ok{background:var(--green);color:#fff}.rm{background:#eee;color:#8a2b25}
.top{display:flex;justify-content:space-between;align-items:center}
.top a{color:var(--amber);text-decoration:none;font-size:13px;font-weight:600}
</style>
</head>
<body>
<div class="box">
<div class="top"><h2 style="text-align:left;margin:0">會員申請管理</h2>
<div><a href="dashboard.html">← 回儀表板</a>　<a href="#" id="lo">登出</a></div></div>
<div class="msg" id="msg"></div>
<h3 style="margin-top:18px;font-size:14px">待核准申請（<span id="pn">0</span>）</h3>
<table id="pend"></table>
<h3 style="margin-top:26px;font-size:14px">全部會員</h3>
<table id="all"></table>
</div>
<script>
const sb=window.supabase.createClient(MEISHI_CFG.url,MEISHI_CFG.key);
const msg=document.getElementById("msg");
async function guard(){
 const {data:{session}}=await sb.auth.getSession();
 if(!session){location.href="index.html";return null;}
 const {data:p}=await sb.from("profiles").select("role,approved").eq("id",session.user.id).single();
 if(!p||p.role!=="admin"||!p.approved){alert("此頁僅限管理員");location.href="dashboard.html";return null;}
 return session;
}
function esc(s){return String(s||"").replace(/[<>&"]/g,c=>({"<":"&lt;",">":"&gt;","&":"&amp;",'"':"&quot;"}[c]));}
async function load(){
 const {data:rows,error}=await sb.from("profiles").select("*").order("created_at",{ascending:false});
 if(error){msg.className="msg err";msg.textContent=error.message;return;}
 const fmt=d=>new Date(d).toLocaleString("zh-TW",{hour12:false});
 const pend=rows.filter(r=>!r.approved),appr=rows.filter(r=>r.approved);
 document.getElementById("pn").textContent=pend.length;
 document.getElementById("pend").innerHTML="<tr><th>姓名</th><th>Email</th><th>說明</th><th>申請時間</th><th>操作</th></tr>"+
  (pend.length?pend.map(r=>`<tr><td>${esc(r.name)||"-"}</td><td>${esc(r.email)}</td><td>${esc(r.note)||"-"}</td><td>${fmt(r.created_at)}</td>
   <td><button class="sm ok" onclick="approve('${r.id}',true)">✓ 核准</button><button class="sm rm" onclick="removeUser('${r.id}','${esc(r.email)}')">✕ 移除</button></td></tr>`).join(""):"<tr><td colspan=5 style='color:#999'>目前沒有待核准的申請</td></tr>");
 document.getElementById("all").innerHTML="<tr><th>姓名</th><th>Email</th><th>身分</th><th>狀態</th><th>加入時間</th><th>操作</th></tr>"+
  appr.map(r=>`<tr><td>${esc(r.name)||"-"}</td><td>${esc(r.email)}</td>
   <td>${r.role==="admin"?'<span class="badge adm">管理員</span>':'<span class="badge a">會員</span>'}</td>
   <td><span class="badge a">已核准</span></td><td>${fmt(r.created_at)}</td>
   <td>${r.role==="admin"?"":`<button class="sm rm" onclick="approve('${r.id}',false)">停用</button>`}</td></tr>`).join("");
}
window.approve=async(id,val)=>{
 const {error}=await sb.from("profiles").update({approved:val}).eq("id",id);
 if(error){msg.className="msg err";msg.textContent=error.message;return;}
 msg.className="msg ok";msg.textContent=val?"已核准":"已停用";load();
};
window.removeUser=async(id,em)=>{
 if(!confirm("確定移除 "+em+" 的申請？"))return;
 const {error}=await sb.from("profiles").delete().eq("id",id);
 if(error){msg.className="msg err";msg.textContent=error.message;return;}
 load();
};
document.getElementById("lo").onclick=async e=>{e.preventDefault();await sb.auth.signOut();location.href="index.html";};
guard().then(s=>{if(s)load();});
</script>
</body></html>
